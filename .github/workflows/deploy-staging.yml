name: Deploy to Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets and vars
        run: |
          missing=""
          check() {
            local val="$1"
            local name="$2"
            if [ -z "$val" ]; then
              missing="${missing}${name}, "
            fi
          }

          check "${{ vars.APP_URL }}" "vars.APP_URL"
          check "${{ vars.API_URL }}" "vars.API_URL"
          check "${{ secrets.BETTER_AUTH_SECRET }}" "secrets.BETTER_AUTH_SECRET"
          check "${{ secrets.BETTER_AUTH_URL }}" "secrets.BETTER_AUTH_URL"
          check "${{ secrets.GH_CLIENT_ID }}" "secrets.GH_CLIENT_ID"
          check "${{ secrets.GH_CLIENT_SECRET }}" "secrets.GH_CLIENT_SECRET"
          check "${{ secrets.GOOGLE_CLIENT_ID }}" "secrets.GOOGLE_CLIENT_ID"
          check "${{ secrets.GOOGLE_CLIENT_SECRET }}" "secrets.GOOGLE_CLIENT_SECRET"
          check "${{ secrets.R2_ACCESS_KEY_ID }}" "secrets.R2_ACCESS_KEY_ID"
          check "${{ secrets.R2_SECRET_ACCESS_KEY }}" "secrets.R2_SECRET_ACCESS_KEY"
          check "${{ secrets.R2_BUCKET_NAME }}" "secrets.R2_BUCKET_NAME"
          check "${{ secrets.R2_ENDPOINT }}" "secrets.R2_ENDPOINT"
          check "${{ secrets.PLATFORM_OWNER_EMAIL }}" "secrets.PLATFORM_OWNER_EMAIL"
          check "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" "secrets.CLOUDFLARE_ACCOUNT_ID"
          check "${{ secrets.CLOUDFLARE_API_TOKEN }}" "secrets.CLOUDFLARE_API_TOKEN"
          check "${{ vars.PLAYWRIGHT_BASE_URL }}" "vars.PLAYWRIGHT_BASE_URL"
          check "${{ vars.PAGES_PROJECT_NAME }}" "vars.PAGES_PROJECT_NAME"
          check "${{ vars.PAGES_BRANCH }}" "vars.PAGES_BRANCH"

          if [ -n "$missing" ]; then
            echo "❌ Missing required repository secrets/vars for staging environment:"
            echo "${missing%, }"
            echo ""
            echo "Configure them at: Settings > Environments > staging > Secrets and variables"
            exit 1
          fi

          echo "✅ All required secrets and vars are present."

      - name: Validate staging environment values
        run: |
          if [ "${{ vars.PAGES_BRANCH }}" != "staging" ]; then
            echo "❌ staging must use vars.PAGES_BRANCH=staging, got '${{ vars.PAGES_BRANCH }}'"
            echo "Configure it at: Settings > Environments > staging > Variables"
            exit 1
          fi

          if [ "${{ vars.APP_URL }}" = "https://drive.nekomata.moe" ]; then
            echo "❌ staging is using the production APP_URL."
            echo "Configure vars.APP_URL in the staging GitHub Environment."
            exit 1
          fi

          if [ "${{ vars.PLAYWRIGHT_BASE_URL }}" = "https://drive.nekomata.moe" ]; then
            echo "❌ staging is using the production PLAYWRIGHT_BASE_URL."
            echo "Configure vars.PLAYWRIGHT_BASE_URL in the staging GitHub Environment."
            exit 1
          fi

          echo "✅ Staging environment values look consistent."

      - name: Provision staging D1 database
        id: provision
        run: |
          pnpm tsx scripts/setup-cloudflare-infra.ts staging
          D1_ID=$(jq -r '.d1_database_id' setup-output.json)
          echo "d1_database_id=${D1_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ D1 database ID: ${D1_ID}"

      - name: Create staging env file
        run: |
          cat > .env.staging << 'EOF'
          APP_URL=${{ vars.APP_URL }}
          API_URL=${{ vars.API_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          PLATFORM_OWNER_EMAIL=${{ secrets.PLATFORM_OWNER_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          STAGING_D1_DATABASE_ID=${{ steps.provision.outputs.d1_database_id }}
          PLAYWRIGHT_BASE_URL=${{ vars.PLAYWRIGHT_BASE_URL }}
          PAGES_PROJECT_NAME=${{ vars.PAGES_PROJECT_NAME }}
          PAGES_BRANCH=${{ vars.PAGES_BRANCH }}
          EOF

      - name: Check staging environment
        run: pnpm env:check:staging

      - name: Prepare Wrangler configs
        run: pnpm env:prepare:staging

      - name: Apply D1 migrations
        run: pnpm --filter @bucketdrive/api exec wrangler --config ../../wrangler.toml d1 migrations apply bucketdrive-db-staging --remote --env staging

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging --config wrangler.toml

      - name: Deploy background Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/workers
          packageManager: pnpm
          command: deploy --env staging

      - name: Build frontend
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy --project-name=${{ vars.PAGES_PROJECT_NAME }} --branch=${{ vars.PAGES_BRANCH }}

      - name: Setup custom domain
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          PAGES_PROJECT_NAME: ${{ vars.PAGES_PROJECT_NAME }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "🌐 Setting up custom domain $CUSTOM_DOMAIN..."
            pnpm tsx scripts/setup-custom-domain.ts
          else
            echo "ℹ️ No CUSTOM_DOMAIN configured, skipping custom domain setup"
          fi

      - name: Push runtime secrets
        run: pnpm env:push:staging

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Accessibility tests
        run: pnpm test:a11y
