name: Setup Cloudflare Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to provision"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  setup:
    name: Setup Cloudflare Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Provision Cloudflare resources
        id: provision
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm tsx scripts/setup-cloudflare-infra.ts ${{ inputs.environment }}
          # Emit JSON output for downstream steps
          {
            echo "json<<EOF"
            cat setup-output.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Environment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV: ${{ inputs.environment }}
        run: |
          gh api "repos/${{ github.repository }}/environments/${ENV}" \
            --method PUT \
            --silent 2>/dev/null || true
          echo "✅ GitHub Environment '${ENV}' ensured"

      - name: Save D1 Database ID to GitHub Environment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV: ${{ inputs.environment }}
          KEY: ${{ fromJson(steps.provision.outputs.json).d1_key }}
          VALUE: ${{ fromJson(steps.provision.outputs.json).d1_database_id }}
        run: |
          set -e
          REPO="${{ github.repository }}"

          # Check if variable already exists
          if gh api "repos/${REPO}/environments/${ENV}/variables/${KEY}" \
              --silent 2>/dev/null; then
            echo "Variable ${KEY} exists, updating..."
            gh api "repos/${REPO}/environments/${ENV}/variables/${KEY}" \
              --method PATCH \
              -f name="${KEY}" \
              -f value="${VALUE}"
            echo "✅ Updated ${KEY} = ${VALUE}"
          else
            echo "Variable ${KEY} does not exist, creating..."
            gh api "repos/${REPO}/environments/${ENV}/variables" \
              --method POST \
              -f name="${KEY}" \
              -f value="${VALUE}"
            echo "✅ Created ${KEY} = ${VALUE}"
          fi

      - name: Summary
        run: |
          echo "## Setup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: ${{ fromJson(steps.provision.outputs.json).environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **D1 Database ID**: ${{ fromJson(steps.provision.outputs.json).d1_database_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **D1 Key**: ${{ fromJson(steps.provision.outputs.json).d1_key }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ fromJson(steps.provision.outputs.json).bucket_name }}" ]; then
            echo "- **R2 Bucket**: ${{ fromJson(steps.provision.outputs.json).bucket_name }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next Steps (manual, one-time)" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Create R2 API tokens and save as GitHub Environment Secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Create OAuth apps (GitHub / Google) and save Client IDs/Secrets as Secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Generate BETTER_AUTH_SECRET and save as Secret" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Set remaining environment variables (APP_URL, API_URL, PAGES_PROJECT_NAME, etc.)" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Configure R2 CORS rules in the Cloudflare Dashboard" >> "$GITHUB_STEP_SUMMARY"
