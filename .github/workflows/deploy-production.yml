name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PLATFORM_OWNER_EMAIL: ${{ vars.PLATFORM_OWNER_EMAIL || secrets.PLATFORM_OWNER_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets and vars
        run: |
          missing=""
          check() {
            local val="$1"
            local name="$2"
            if [ -z "$val" ]; then
              missing="${missing}${name}, "
            fi
          }

          check "${{ vars.APP_URL }}" "vars.APP_URL"
          check "${{ vars.API_URL }}" "vars.API_URL"
          check "${{ secrets.BETTER_AUTH_SECRET }}" "secrets.BETTER_AUTH_SECRET"
          check "${{ secrets.BETTER_AUTH_URL }}" "secrets.BETTER_AUTH_URL"
          check "${{ secrets.GH_CLIENT_ID }}" "secrets.GH_CLIENT_ID"
          check "${{ secrets.GH_CLIENT_SECRET }}" "secrets.GH_CLIENT_SECRET"
          check "${{ secrets.GOOGLE_CLIENT_ID }}" "secrets.GOOGLE_CLIENT_ID"
          check "${{ secrets.GOOGLE_CLIENT_SECRET }}" "secrets.GOOGLE_CLIENT_SECRET"
          check "${{ secrets.R2_ACCESS_KEY_ID }}" "secrets.R2_ACCESS_KEY_ID"
          check "${{ secrets.R2_SECRET_ACCESS_KEY }}" "secrets.R2_SECRET_ACCESS_KEY"
          check "${{ secrets.R2_BUCKET_NAME }}" "secrets.R2_BUCKET_NAME"
          check "${{ secrets.R2_ENDPOINT }}" "secrets.R2_ENDPOINT"
          check "$PLATFORM_OWNER_EMAIL" "vars.PLATFORM_OWNER_EMAIL or secrets.PLATFORM_OWNER_EMAIL"
          check "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" "secrets.CLOUDFLARE_ACCOUNT_ID"
          check "${{ secrets.CLOUDFLARE_API_TOKEN }}" "secrets.CLOUDFLARE_API_TOKEN"
          # Note: PRODUCTION_D1_DATABASE_ID will be auto-provisioned if not configured
          check "${{ vars.PAGES_PROJECT_NAME }}" "vars.PAGES_PROJECT_NAME"
          check "${{ vars.PAGES_BRANCH }}" "vars.PAGES_BRANCH"

          if [ -n "$missing" ]; then
            echo "❌ Missing required repository secrets/vars for production environment:"
            echo "${missing%, }"
            echo ""
            echo "Configure them at: Settings > Environments > production > Secrets and variables"
            exit 1
          fi

          echo "✅ All required secrets and vars are present."

      - name: Validate production environment values
        run: |
          if [ "${{ vars.PAGES_BRANCH }}" != "production" ]; then
            echo "❌ production must use vars.PAGES_BRANCH=production, got '${{ vars.PAGES_BRANCH }}'"
            echo "Configure it at: Settings > Environments > production > Variables"
            exit 1
          fi

          if [ "${{ vars.APP_URL }}" = "https://staging.bucketdrive.dev" ]; then
            echo "❌ production is using the staging APP_URL."
            echo "Configure vars.APP_URL in the production GitHub Environment."
            exit 1
          fi

          echo "✅ Production environment values look consistent."

      - name: Provision Cloudflare infrastructure
        id: infra
        run: |
          pnpm tsx scripts/setup-cloudflare-infra.ts production
          D1_ID=$(jq -r '.d1_database_id' setup-output.json)
          echo "d1_database_id=${D1_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ D1 database ID: ${D1_ID}"

      - name: Create production env file
        run: |
          cat > .env.production << 'EOF'
          APP_URL=${{ vars.APP_URL }}
          API_URL=${{ vars.API_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          PLATFORM_OWNER_EMAIL=${{ vars.PLATFORM_OWNER_EMAIL || secrets.PLATFORM_OWNER_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          PRODUCTION_D1_DATABASE_ID=${{ steps.infra.outputs.d1_database_id }}
          PAGES_PROJECT_NAME=${{ vars.PAGES_PROJECT_NAME }}
          PAGES_BRANCH=${{ vars.PAGES_BRANCH }}
          EOF

      - name: Check production environment
        run: pnpm env:check:production

      - name: Prepare Wrangler configs
        run: pnpm env:prepare:production

      - name: Apply D1 migrations
        run: pnpm --filter @bucketdrive/api exec wrangler --config ../../wrangler.toml d1 migrations apply bucketdrive-db --remote --env production

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production --config wrangler.toml

      - name: Validate Workers cron trigger permissions
        run: |
          echo "🔍 Validating Cloudflare API token permissions for cron triggers..."
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          SCRIPT_NAME="bucketdrive-workers-production"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT}/workers/scripts/${SCRIPT_NAME}/schedules" \
            -H "Authorization: Bearer ${TOKEN}")

          case "$STATUS" in
            200)
              echo "✅ Token can read cron schedules for ${SCRIPT_NAME}."
              ;;
            404)
              echo "ℹ️ ${SCRIPT_NAME} does not exist yet; Wrangler will create it during deploy."
              ;;
            401|403)
              echo "❌ The CLOUDFLARE_API_TOKEN cannot access cron schedules for ${SCRIPT_NAME} (HTTP $STATUS)."
              echo "   To deploy cron triggers, the token needs permission to edit Workers scripts and schedules."
              echo "   Update the production CLOUDFLARE_API_TOKEN at: https://dash.cloudflare.com/profile/api-tokens"
              exit 1
              ;;
            *)
              echo "❌ Unexpected response while validating cron schedule permissions (HTTP $STATUS)."
              echo "   Endpoint: /accounts/<account_id>/workers/scripts/${SCRIPT_NAME}/schedules"
              exit 1
              ;;
          esac

          echo "✅ Cron trigger permission check completed."

      - name: Deploy background Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/workers
          packageManager: pnpm
          command: deploy --env production

      - name: Build frontend
        run: pnpm build

      - name: Create Cloudflare Pages project
        run: |
          pnpm exec wrangler pages project create ${{ vars.PAGES_PROJECT_NAME }} --production-branch=${{ vars.PAGES_BRANCH }} || true
          echo "✅ Pages project ${{ vars.PAGES_PROJECT_NAME }} ensured"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=${{ vars.PAGES_PROJECT_NAME }} --branch=${{ vars.PAGES_BRANCH }}

      - name: Setup custom domain
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          PAGES_PROJECT_NAME: ${{ vars.PAGES_PROJECT_NAME }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "🌐 Setting up custom domain $CUSTOM_DOMAIN..."
            pnpm tsx scripts/setup-custom-domain.ts
          else
            echo "ℹ️ No CUSTOM_DOMAIN configured, skipping custom domain setup"
          fi

      - name: Push runtime secrets
        run: pnpm env:push:production

      - name: Smoke check production
        env:
          APP_URL: ${{ vars.APP_URL }}
          API_URL: ${{ vars.API_URL }}
        run: |
          echo "🔍 Checking production API health..."
          curl -fsS --retry 3 --retry-delay 5 "${API_URL%/}/health" >/dev/null
          echo "✅ API health check passed."

          echo "🔍 Checking production frontend..."
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
          if [ "$FRONTEND_STATUS" = "200" ]; then
            echo "✅ Frontend responds with 200."
          elif [ "$FRONTEND_STATUS" = "403" ]; then
            echo "⚠️ Frontend returned 403. This usually means the custom domain SSL certificate is still being provisioned by Cloudflare."
            echo "   The app will become available automatically within a few minutes."
          else
            echo "❌ Frontend returned unexpected status: $FRONTEND_STATUS"
            exit 1
          fi

          echo "✅ Production smoke checks passed."
