name: Deploy to Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets and vars
        run: |
          missing=""
          check() {
            local val="$1"
            local name="$2"
            if [ -z "$val" ]; then
              missing="${missing}${name}, "
            fi
          }

          check "${{ vars.APP_URL }}" "vars.APP_URL"
          check "${{ vars.API_URL }}" "vars.API_URL"
          check "${{ secrets.BETTER_AUTH_SECRET }}" "secrets.BETTER_AUTH_SECRET"
          check "${{ secrets.BETTER_AUTH_URL }}" "secrets.BETTER_AUTH_URL"
          check "${{ secrets.GH_CLIENT_ID }}" "secrets.GH_CLIENT_ID"
          check "${{ secrets.GH_CLIENT_SECRET }}" "secrets.GH_CLIENT_SECRET"
          check "${{ secrets.GOOGLE_CLIENT_ID }}" "secrets.GOOGLE_CLIENT_ID"
          check "${{ secrets.GOOGLE_CLIENT_SECRET }}" "secrets.GOOGLE_CLIENT_SECRET"
          check "${{ secrets.R2_ACCESS_KEY_ID }}" "secrets.R2_ACCESS_KEY_ID"
          check "${{ secrets.R2_SECRET_ACCESS_KEY }}" "secrets.R2_SECRET_ACCESS_KEY"
          check "${{ secrets.R2_BUCKET_NAME }}" "secrets.R2_BUCKET_NAME"
          check "${{ secrets.R2_ENDPOINT }}" "secrets.R2_ENDPOINT"
          check "${{ secrets.PLATFORM_OWNER_EMAIL }}" "secrets.PLATFORM_OWNER_EMAIL"
          check "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" "secrets.CLOUDFLARE_ACCOUNT_ID"
          check "${{ secrets.CLOUDFLARE_API_TOKEN }}" "secrets.CLOUDFLARE_API_TOKEN"
          check "${{ vars.PRODUCTION_D1_DATABASE_ID }}" "vars.PRODUCTION_D1_DATABASE_ID"
          check "${{ vars.PLAYWRIGHT_BASE_URL }}" "vars.PLAYWRIGHT_BASE_URL"
          check "${{ vars.PAGES_PROJECT_NAME }}" "vars.PAGES_PROJECT_NAME"
          check "${{ vars.PAGES_BRANCH }}" "vars.PAGES_BRANCH"

          if [ -n "$missing" ]; then
            echo "❌ Missing required repository secrets/vars for production environment:"
            echo "${missing%, }"
            echo ""
            echo "Configure them at: Settings > Environments > production > Secrets and variables"
            exit 1
          fi

          echo "✅ All required secrets and vars are present."

      - name: Create production env file
        run: |
          cat > .env.production << 'EOF'
          APP_URL=${{ vars.APP_URL }}
          API_URL=${{ vars.API_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          PLATFORM_OWNER_EMAIL=${{ secrets.PLATFORM_OWNER_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          PRODUCTION_D1_DATABASE_ID=${{ vars.PRODUCTION_D1_DATABASE_ID }}
          PLAYWRIGHT_BASE_URL=${{ vars.PLAYWRIGHT_BASE_URL }}
          PAGES_PROJECT_NAME=${{ vars.PAGES_PROJECT_NAME }}
          PAGES_BRANCH=${{ vars.PAGES_BRANCH }}
          EOF

      - name: Check production environment
        run: pnpm env:check:production

      - name: Prepare Wrangler configs
        run: pnpm env:prepare:production

      - name: Apply D1 migrations
        run: pnpm --filter @bucketdrive/api exec wrangler --config ../../wrangler.toml d1 migrations apply bucketdrive-db --remote --env production

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production --config wrangler.toml

      - name: Deploy background Workers
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/workers
          packageManager: pnpm
          command: deploy --env production

      - name: Build frontend
        run: pnpm build

      - name: Create Cloudflare Pages project
        run: |
          pnpm exec wrangler pages project create ${{ vars.PAGES_PROJECT_NAME }} --production-branch=${{ vars.PAGES_BRANCH }} || true
          echo "✅ Pages project ${{ vars.PAGES_PROJECT_NAME }} ensured"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ vars.PAGES_PROJECT_NAME }} --branch=${{ vars.PAGES_BRANCH }}

      - name: Push runtime secrets
        run: pnpm env:push:production

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Accessibility tests
        run: pnpm test:a11y
