<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta
      name="description"
      content="BucketDrive is a secure workspace for private file storage and link sharing."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BucketDrive" />
    <meta property="og:title" content="BucketDrive" />
    <meta
      property="og:description"
      content="Secure private file storage and link sharing."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BucketDrive" />
    <meta
      name="twitter:description"
      content="Secure private file storage and link sharing."
    />
    <title>BucketDrive</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem("bucketdrive-theme")
          var theme = "system"
          if (stored) {
            try {
              var parsed = JSON.parse(stored)
              if (parsed && parsed.state && parsed.state.theme) {
                theme = parsed.state.theme
              }
            } catch (e) {}
          }
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme
          if (resolved === "dark") {
            document.documentElement.classList.add("dark")
          } else {
            document.documentElement.classList.remove("dark")
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
